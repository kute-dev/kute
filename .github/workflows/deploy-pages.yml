name: Deploy GitHub Pages
on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/assets/incident-walkthrough-all-namespaces.gif"
      - "docs/assets/namespace-palette-demo.gif"
      - "docs/assets/goto-palette-demo.gif"
      - "docs/assets/demo-everyday-actions.gif"
      - "docs/assets/demo-routing-table.gif"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Stage site with demo GIFs
        # website/demo.html references these under assets/ — kept only in
        # docs/assets/ (the recording pipeline's output) to avoid committing
        # duplicate binary copies, and merged in here at deploy time instead.
        run: |
          mkdir -p _site/assets
          cp -r website/. _site/
          cp docs/assets/incident-walkthrough-all-namespaces.gif docs/assets/namespace-palette-demo.gif docs/assets/goto-palette-demo.gif docs/assets/demo-everyday-actions.gif docs/assets/demo-routing-table.gif _site/assets/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "./_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
