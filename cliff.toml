# git-cliff configuration for release-time changelog generation (docs/design/README.md
# §28a/28b). Consumed by scripts/release-notes.sh, not run ad hoc — see that script.
# https://git-cliff.org/docs/configuration

[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Only feat/fix/perf become changelog entries (mapped to new/fix/perf — the same
# lowercase tags 28b renders); everything else, including anything unmatched by
# these three, is dropped outright rather than bucketed as "other".
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->new" },
  { message = "^fix", group = "<!-- 1 -->fix" },
  { message = "^perf", group = "<!-- 2 -->perf" },
  { message = ".*", skip = true },
]
filter_commits = true
sort_commits = "oldest"
