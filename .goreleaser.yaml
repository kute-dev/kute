version: 2

project_name: kute

builds:
  - main: ./cmd/kute
    binary: kute
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# The changelog is generated up front by scripts/release-notes.sh (git-cliff,
# see cliff.toml) and passed in via `goreleaser release --release-notes`;
# goreleaser's own changelog machinery is unused.
changelog:
  disable: true

release:
  extra_files:
    - glob: ./.release/changelog.json

homebrew_casks:
  - name: kute
    binaries:
      - kute
    homepage: "https://github.com/kute-dev/kute"
    description: "A TUI Kubernetes console, built with Bubble Tea and Lip Gloss."
    license: "Apache-2.0"
    repository:
      owner: kute-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: kute-release-bot
      email: releases@kute.dev
